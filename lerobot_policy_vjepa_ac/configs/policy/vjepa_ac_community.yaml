# @package _global_
# VJEPA AC training config for community dataset (DROID-style parameters)
# See plans/vjepa_ac_community_dataset_training_plan.md for details
#
# IMPORTANT: Dataset stored on NAS at /mnt/nas for storage constraints.
# Optimized for SINGLE GPU with 16GB VRAM.

seed: 42

dataset:
  repo_id: "azaracla/community_dataset_v1"

num_workers: 8
batch_size: 4
steps: 94500
eval_freq: 10000
save_freq: 20000
log_freq: 100
save_checkpoint: true

eval:
  n_episodes: 50
  batch_size: 4

policy:
  type: vjepa_ac
  model_name: "vjepa2_1_vit_giant_384"
  encoder_repo_id: "facebookresearch/vjepa2"
  action_dim: 7  # SO-100: 6 joints + gripper
  img_size: 256
  predictor_embed_dim: 1024
  pred_depth: 24
  num_heads: 16
  mpc_horizon: 15
  cem_num_samples: 800
  num_frames: 8
  tubelet_size: 2
  normalize_reps: true
  auto_steps: 2
  use_extrinsics: false
  augmentation_random_resized_crop_enabled: true
  augmentation_random_resized_crop_scale: 1.777
  augmentation_random_resized_crop_ratio: [0.75, 1.35]
  augmentation_random_resized_crop_target_size: 256
  augmentation_horizontal_flip: false

optimizer:
  type: adamw
  lr: 4.25e-4
  weight_decay: 0.04
  betas: [0.9, 0.999]
  eps: 1e-8
  grad_clip_norm: 10.0

scheduler:
  type: wsd
  num_warmup_steps: 4500
  num_stable_steps: 85500
  num_anneal_steps: 4500
  start_lr: 7.5e-5
  final_lr: 0.0
  peak_lr: 4.25e-4
