# @package _global_
# VJEPA AC training config for community dataset (DROID-style parameters)
# See plans/vjepa_ac_community_dataset_training_plan.md for details
#
# IMPORTANT: Dataset stored on NAS at /mnt/nas for storage constraints.
# Optimized for SINGLE GPU with 16GB VRAM.

seed: 42

# Dataset: community_aggregated (128 sub-datasets from HuggingFaceVLA/community_dataset_v1)
# Aggregated from converted v3.0 sub-datasets
dataset_repo_id: "local"
dataset_root: "/mnt/nas/datasets/community_aggregated"

# Optimized for NAS (NFS4) performance
num_workers: 8
training:
  offline_steps: 94500  # 315 epochs * 300 IPE (DROID scale)
  batch_size: 4         # Adjust based on GPU memory
  eval_freq: 10000
  save_freq: 20000
  log_freq: 100
  save_checkpoint: true
  prefetch_factor: 2

eval:
  n_episodes: 50
  batch_size: 4
  num_workers: 4

policy:
  name: vjepa_ac
  model_name: "vjepa2_1_vit_giant_384"  # ViT-Giant (1B params)
  repo_id: "facebookresearch/vjepa2"
  action_dim: 7  # SO-100: 6 joints + gripper
  img_size: 256  # DROID: 256 (not 384)
  predictor_embed_dim: 1024
  pred_depth: 24
  num_heads: 16
  mpc_horizon: 15
  cem_num_samples: 800
  n_action_steps: 1
  n_obs_steps: 4
  num_frames: 8       # Keep 8 frames
  tubelet_size: 2
  normalize_reps: true
  auto_steps: 2
  use_extrinsics: false

optimizer:
  name: adamw
  learning_rate: 4.25e-4  # DROID
  weight_decay: 0.04       # DROID
  betas: [0.9, 0.999]
  eps: 1e-8

scheduler:
  name: wsd
  warmup_steps: 4500      # 15 epochs * 300 IPE
  stable_steps: 85500     # 285 epochs * 300 IPE
  anneal_steps: 4500      # 15 epochs * 300 IPE
  start_lr: 7.5e-5        # DROID start_lr
  final_lr: 0.0           # DROID final_lr
  peak_lr: 4.25e-4        # DROID peak_lr

# DROID-style augmentation (applied in processor)
augmentation:
  random_resized_crop:
    enabled: true
    scale: 1.777
    ratio: [0.75, 1.35]
    target_size: 256
  horizontal_flip: false
  normalize:
    enabled: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
