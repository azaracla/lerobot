# @package _global_
# Config cloud — L40S 46GB VRAM
# batch_size 12 (vs 4 local) + num_workers 8

seed: 42

output_dir: outputs/vjepa_ac/run_cloud  # overridé par vastai_remote_setup.sh

dataset:
  repo_id: azaracla/community_dataset_v1_aggregated
  revision: main
  streaming: false
  image_transforms:
    enable: true
    max_num_transforms: 1
    random_order: false
    tfs:
      droid_random_resized_crop:
        type: DroidRandomResizedCrop
        weight: 1.0
        kwargs:
          scale: 1.777
          ratio: [0.75, 1.35]
          target_size: 384

batch_size: 12        # 3x local — L40S 46GB le supporte (~24GB activations estimées)
num_workers: 8        # 12 vCPUs dispo
steps: 50000
tolerance_s: 1e-3
rename_map:
  "observation.images.image": "observation.images.image"
eval_freq: 50000
save_freq: 50000
log_freq: 100
use_policy_training_preset: false
save_checkpoint: true

eval:
  n_episodes: 5
  batch_size: 1

policy:
  type: vjepa_ac
  push_to_hub: true
  repo_id: azaracla/vjepa_ac
  model_name: "vjepa2_1_vit_giant_384"
  encoder_repo_id: "facebookresearch/vjepa2"
  action_dim: 6
  img_size: 384
  num_frames: 4
  n_obs_steps: 4
  vfps: 30
  fps: 4
  use_amp: true
  predictor_embed_dim: 1024
  pred_depth: 24
  mpc_horizon: 15
  cem_num_samples: 200
  cem_num_iters: 3
  use_imagenet_for_visuals: true
  augmentation_random_resized_crop_enabled: true
  augmentation_random_resized_crop_scale: 1.777
  augmentation_random_resized_crop_ratio: [0.75, 1.35]
  augmentation_random_resized_crop_target_size: 384
  augmentation_horizontal_flip: false
  log_observation_images: false
  log_observation_frequency: 1
  save_images_to_disk: false
  save_images_dir: outputs/debug_images

optimizer:
  type: adamw
  lr: 3e-5            # LR scalé linéairement : 1e-5 * (12/4) = 3e-5
  weight_decay: 0.04

scheduler:
  type: wsd
  num_warmup_steps: 1500   # 4500 local / 3 (batch scale) — même nb de samples
  num_stable_steps: 44000
  num_anneal_steps: 1500
  start_lr: 1e-6
  peak_lr: 3e-5
  final_lr: 0.0

wandb:
  enable: true
