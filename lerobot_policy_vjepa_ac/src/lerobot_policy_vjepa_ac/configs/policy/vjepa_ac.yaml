# @package _global_

seed: 42

output_dir: outputs/vjepa_ac/run_20260408

dataset:
  repo_id: azaracla/community_dataset_v1_aggregated
  revision: main
  streaming: false
  image_transforms:
    enable: true
    max_num_transforms: 1
    random_order: false
    tfs:
      droid_random_resized_crop:
        type: DroidRandomResizedCrop
        weight: 1.0
        kwargs:
          scale: 1.777
          ratio: [0.75, 1.35]
          target_size: 384  # Match vjepa2.1 native resolution

batch_size: 4
num_workers: 1
steps: 50000
tolerance_s: 1e-3
rename_map:
  "observation.images.image": "observation.images.image"
eval_freq: 10000
save_freq: 10000
log_freq: 100
use_policy_training_preset: false
save_checkpoint: true

eval:
  n_episodes: 5
  batch_size: 1

policy:
  type: vjepa_ac
  model_name: "vjepa2_1_vit_giant_384"
  encoder_repo_id: "facebookresearch/vjepa2"
  action_dim: 6
  img_size: 384
  num_frames: 4  # Minimized for RAM
  n_obs_steps: 4  # Minimized for RAM
  vfps: 30  # Original video FPS
  fps: 4  # 2 frames apart
  use_amp: true
  predictor_embed_dim: 1024
  pred_depth: 24
  mpc_horizon: 1
  auto_steps: 2
  cem_num_samples: 200
  cem_num_iters: 3
  # Per-joint CEM calibration — intra-episode delta stats (100 episodes, 41878 frames)
  # azaracla/community_dataset_v1_aggregated, 30fps natif, units: degrees
  # [shoulder_pan, shoulder_lift, elbow_flex, wrist_flex, wrist_roll, gripper]
  # std  = [0.45, 1.01, 0.87, 0.34, 0.58, 0.42]
  # max  = 3 * std (same rule as Meta DROID: maxnorm ≈ 3×std for planned dimensions)
  cem_std_per_joint: [0.45, 1.01, 0.87, 0.34, 0.58, 0.42]
  cem_maxnorm_per_joint: [1.35, 3.03, 2.62, 1.03, 1.74, 1.26]
  use_imagenet_for_visuals: true
  augmentation_random_resized_crop_enabled: true
  augmentation_random_resized_crop_scale: 1.777
  augmentation_random_resized_crop_ratio: [0.75, 1.35]
  augmentation_random_resized_crop_target_size: 384
  augmentation_horizontal_flip: false
  log_observation_images: false
  log_observation_frequency: 1
  save_images_to_disk: false
  save_images_dir: outputs/debug_images

optimizer:
  type: adamw
  lr: 1e-5  # Scaled from paper: 4.25e-4 * (2/256)
  weight_decay: 0.04  # Match DROID paper

scheduler:
  type: diffuser
  name: cosine
  num_warmup_steps: 4500  # Match DROID paper

wandb:
  enable: true
