# @package _global_
# Resume depuis le checkpoint 10K avec WSD scheduler
# Le modèle est déjà warmed up → on démarre directement en phase stable

seed: 42
output_dir: outputs/vjepa_ac/run_20260408
checkpoint_path: outputs/vjepa_ac/run_20260408/checkpoints/020000
resume: true

dataset:
  repo_id: azaracla/community_dataset_v1_aggregated
  revision: main
  streaming: false
  image_transforms:
    enable: true
    max_num_transforms: 1
    random_order: false
    tfs:
      droid_random_resized_crop:
        type: DroidRandomResizedCrop
        weight: 1.0
        kwargs:
          scale: 1.777
          ratio: [0.75, 1.35]
          target_size: 384

batch_size: 4
gradient_accumulation_steps: 8  # batch effectif = 32 → gradients propres
num_workers: 1
steps: 100000     # 100K optimizer steps (= 800K forward passes) depuis le checkpoint 20K
tolerance_s: 1e-3
rename_map:
  "observation.images.image": "observation.images.image"
eval_freq: 10000
save_freq: 10000
log_freq: 100
use_policy_training_preset: false
save_checkpoint: true

eval:
  n_episodes: 5
  batch_size: 1

policy:
  type: vjepa_ac
  model_name: "vjepa2_1_vit_giant_384"
  encoder_repo_id: "facebookresearch/vjepa2"
  action_dim: 6
  img_size: 384
  num_frames: 4
  n_obs_steps: 4
  vfps: 30
  fps: 4
  use_amp: true
  predictor_embed_dim: 1024
  pred_depth: 24
  mpc_horizon: 15
  cem_num_samples: 200
  cem_num_iters: 3
  use_imagenet_for_visuals: true
  augmentation_random_resized_crop_enabled: true
  augmentation_random_resized_crop_scale: 1.777
  augmentation_random_resized_crop_ratio: [0.75, 1.35]
  augmentation_random_resized_crop_target_size: 384
  augmentation_horizontal_flip: false
  log_observation_images: false
  log_observation_frequency: 1
  save_images_to_disk: false
  save_images_dir: outputs/debug_images

optimizer:
  type: adamw
  lr: 1e-5
  weight_decay: 0.04
  grad_clip_norm: 10.0

scheduler:
  type: wsd
  num_warmup_steps: 500     # court warmup pour stabiliser après reprise
  num_stable_steps: 85000   # longue phase stable : c'est là que le modèle apprend
  num_anneal_steps: 4500
  start_lr: 7.5e-6          # repart doucement
  peak_lr: 1e-5             # même peak qu'avant
  final_lr: 0.0

wandb:
  enable: true
