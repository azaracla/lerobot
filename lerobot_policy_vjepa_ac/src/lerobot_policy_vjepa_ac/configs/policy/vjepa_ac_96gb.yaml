# @package _global_
# Config for 96GB VRAM GPU (A100/H100 equivalent)
# Based on vjepa_ac.yaml with memory-optimized settings

seed: 42

output_dir: outputs/vjepa_ac/community_so100_96gb

dataset:
  repo_id: azaracla/community_dataset_v1_aggregated
  revision: main
  streaming: true
  image_transforms:
    enable: true
    max_num_transforms: 1
    random_order: false
    tfs:
      droid_random_resized_crop:
        type: DroidRandomResizedCrop
        weight: 1.0
        kwargs:
          scale: 1.777
          ratio: [0.75, 1.35]
          target_size: 384

batch_size: 8
num_workers: 8
steps: 300000
eval_freq: 10000
save_freq: 50000
log_freq: 100
save_checkpoint: true

eval:
  n_episodes: 50
  batch_size: 10

policy:
  type: vjepa_ac
  model_name: "vjepa2_1_vit_giant_384"
  encoder_repo_id: "facebookresearch/vjepa2"
  action_dim: 6
  img_size: 384
  num_frames: 8
  n_obs_steps: 8  # Match DROID paper
  vfps: 30  # Original video FPS
  fps: 4  # Target FPS (matching DROID paper)
  use_amp: true
  predictor_embed_dim: 1024
  pred_depth: 24
  mpc_horizon: 15
  cem_num_samples: 800
  cem_num_iters: 5
  use_imagenet_for_visuals: true
  augmentation_random_resized_crop_enabled: true
  augmentation_random_resized_crop_scale: 1.777
  augmentation_random_resized_crop_ratio: [0.75, 1.35]
  augmentation_random_resized_crop_target_size: 384
  augmentation_horizontal_flip: false
  use_activation_checkpointing: true

optimizer:
  type: adamw
  lr: 1.33e-5  # Scaled from paper: 4.25e-4 * (8/256)
  weight_decay: 0.04  # Match DROID paper

scheduler:
  type: diffuser
  name: cosine
  num_warmup_steps: 4500  # Match DROID paper
  scheduler_anneal_steps: 4500  # Match DROID paper
  scheduler_final_lr: 0.0  # Match DROID paper

wandb:
  enable: true
